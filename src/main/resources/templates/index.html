<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Student Form</h4>
                </div>
                <div class="card-body">

                    <!-- success message -->
                    <div th:if="${smsg}" class="alert alert-success" th:text="${smsg}"></div>

                    <!-- error message -->
                    <div th:if="${emsg}" class="alert alert-danger" th:text="${emsg}"></div>

                    <!-- Student Form -->
                    <form th:action="@{/saveStudent}" th:object="${student}" method="post">

                        <!-- Hidden ID field for edit -->
                        <input type="hidden" th:field="*{sid}"/>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="number" th:field="*{phno}" class="form-control" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Save</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/students">View all students</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
