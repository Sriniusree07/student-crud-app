<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">View Students</h4>
        </div>

        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>S.No</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="stu, stat : ${students}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${stu.name}"></td>
                    <td th:text="${stu.email}"></td>
                    <td th:text="${stu.phno}"></td>
                    <td>
                        <a th:href="@{/edit(id=${stu.sid})}" 
                           class="btn btn-warning btn-sm">Edit</a>

                        <a th:href="@{/delete(id=${stu.sid})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this student?');">
                           Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="text-center">
                <a href="/" class="btn btn-secondary">Add New Student</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
